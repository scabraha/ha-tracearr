name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    name: Validate HACS
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration
          ignore: topics

  validate-hassfest:
    runs-on: ubuntu-latest
    name: Validate Hassfest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master
